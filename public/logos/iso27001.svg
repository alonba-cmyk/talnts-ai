<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <defs>
    <path id="curvedText" d="M 15,120 A 85,85 0 1,1 185,120"/>
  </defs>
  <!-- Curved text around globe -->
  <text font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="600" fill="white" letter-spacing="2">
    <textPath href="#curvedText" startOffset="50%" text-anchor="middle">ISO 27001 INFORMATION SECURITY</textPath>
  </text>
  <!-- Globe -->
  <g transform="translate(100,100)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="55" stroke="white" stroke-width="3" fill="none"/>
    <!-- Horizontal lines -->
    <line x1="-55" y1="0" x2="55" y2="0" stroke="white" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="55" ry="22" stroke="white" stroke-width="1.5" fill="none"/>
    <ellipse cx="0" cy="0" rx="55" ry="40" stroke="white" stroke-width="1" fill="none"/>
    <!-- Vertical meridians -->
    <ellipse cx="0" cy="0" rx="22" ry="55" stroke="white" stroke-width="1.5" fill="none"/>
    <ellipse cx="0" cy="0" rx="40" ry="55" stroke="white" stroke-width="1" fill="none"/>
    <line x1="0" y1="-55" x2="0" y2="55" stroke="white" stroke-width="2"/>
  </g>
  <!-- ISO text inside globe -->
  <text x="100" y="112" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="900" fill="white" text-anchor="middle">ISO</text>
  <!-- 27001 below -->
  <text x="100" y="195" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="900" fill="white" text-anchor="middle">27001</text>
</svg>
