<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="white">
  <!-- Background crescent/moon shape -->
  <path d="M100,10 A75,75 0 0,0 25,130 L100,130 Z" fill="white" opacity="0.12"/>
  <!-- Caduceus -->
  <g transform="translate(100,10)">
    <!-- Top orb -->
    <circle cx="0" cy="8" r="6" fill="white"/>
    <!-- Wings -->
    <path d="M-6,16 C-18,6 -40,4 -50,16 C-56,24 -44,30 -30,24 C-20,20 -12,18 -6,18" fill="white" opacity="0.9"/>
    <path d="M6,16 C18,6 40,4 50,16 C56,24 44,30 30,24 C20,20 12,18 6,18" fill="white" opacity="0.9"/>
    <!-- Staff -->
    <rect x="-2.5" y="14" width="5" height="100" fill="white" rx="2"/>
    <!-- Left serpent -->
    <path d="M0,24 C-16,34 -18,46 0,56 C18,66 16,78 0,88 C-16,98 -14,108 0,114" stroke="white" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Right serpent -->
    <path d="M0,24 C16,34 18,46 0,56 C-18,66 -16,78 0,88 C16,98 14,108 0,114" stroke="white" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Serpent overlap cleanup - center staff covers crossings -->
    <rect x="-3" y="52" width="6" height="8" fill="white"/>
    <rect x="-3" y="84" width="6" height="8" fill="white"/>
  </g>
  <!-- HIPAA text -->
  <text x="100" y="170" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="900" fill="white" text-anchor="middle" letter-spacing="2">HIPAA</text>
</svg>
