<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <path id="outerTop" d="M 30,100 A 70,70 0 1,1 170,100"/>
    <path id="outerBottom" d="M 170,100 A 70,70 0 1,1 30,100"/>
  </defs>
  <!-- Outer thick ring -->
  <circle cx="100" cy="100" r="92" stroke="white" stroke-width="4" fill="none"/>
  <circle cx="100" cy="100" r="68" stroke="white" stroke-width="4" fill="none"/>
  <!-- Dark ring fill between circles -->
  <circle cx="100" cy="100" r="80" stroke="white" stroke-width="1" fill="none" opacity="0.15"/>
  <!-- Curved text top -->
  <text font-family="Arial, Helvetica, sans-serif" font-size="10" fill="white" letter-spacing="1.5">
    <textPath href="#outerTop" startOffset="50%" text-anchor="middle">AICPA Service Organization Control Reports</textPath>
  </text>
  <!-- SM superscript -->
  <text x="168" y="74" font-family="Arial, Helvetica, sans-serif" font-size="6" fill="white">SM</text>
  <!-- Curved text bottom -->
  <text font-family="Arial, Helvetica, sans-serif" font-size="10" fill="white" letter-spacing="1">
    <textPath href="#outerBottom" startOffset="50%" text-anchor="middle">Formerly SAS 70 Reports</textPath>
  </text>
  <!-- Center content -->
  <text x="100" y="88" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">AICPA</text>
  <!-- Divider line -->
  <line x1="55" y1="96" x2="145" y2="96" stroke="white" stroke-width="2"/>
  <text x="100" y="122" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" fill="white" text-anchor="middle">SOC 2</text>
</svg>
